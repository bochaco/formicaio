name: Docker Image CI

on:
  push:
    branches: [ "feat-windows-support" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: windows-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout source code
        uses: actions/checkout@v4
  
      - name: Build and Push container to registry
        run: |
          docker build --file=windows.Dockerfile -t ${{ vars.DOCKERHUB_USERNAME }}/formicaio:latest_win .
          docker push ${{ vars.DOCKERHUB_USERNAME }}/formicaio:latest_win
