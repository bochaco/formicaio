name: Docker Image CI

on:
  push:
    branches: [ "feat-windows-support" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ${{ matrix.os }}

    strategy:
      max-parallel: 3
      matrix:
        os: [windows-latest]
        include:
        - os: windows-latest
          base: nanoserver-1809
          file: windows.Dockerfile
          tag: ${{ vars.DOCKERHUB_USERNAME }}/formicaio:latest_win

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout source code
        uses: actions/checkout@v4
  
      - name: Build container
        run: |
          docker build --file=windows.Dockerfile --build-arg BASE=${{ matrix.base }} -t ${{ matrix.tag }} .

      - name: Push container to registry
        run: |
          docker push ${{ matrix.tag }}
